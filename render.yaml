# Render Blueprint – Galiluz monorepo
# Services from one repo, all deploy from the main branch only.
#
# 1. galiluz-web        – Nuxt 3 SSR app (Web Service)
# 2. galiluz-wa-bot     – WhatsApp Cloud API webhook bot (Web Service)
# 3. galiluz-wa-gateway – WhatsApp gateway via Green API; OTP delivery + future actions (Web Service, single instance)
#
# NOTE: the old galiluz-wa listener (Baileys group ingestion) is legacy and is NOT
# managed by this blueprint — it has no env groups here.
#
# Env vars are organized into fine-grained groups: galiluz-core (shared secret),
# galiluz-int-* (per-integration credentials), galiluz-app-* (per-app config).
# Full reference + group→service matrix: docs/ENVIRONMENT.md.
# NODE_ENV / NODE_VERSION (and the listener's WA_AUTH_PATH) are set inline per service.

services:
  # ── Nuxt 3 Web App ────────────────────────────────────────────
  - type: web
    name: galiluz-web
    runtime: node
    branch: main
    plan: starter
    region: frankfurt
    buildCommand: npm install && npm run build
    # TEMPORARY (one-time): run the publishingAs→accounts.title migration once on deploy,
    # before the new version goes live. Idempotent + no-downtime (a failure halts the deploy
    # and the old version keeps serving). REMOVE this line once it has run (then redeploy).
    preDeployCommand: node scripts/migrate-publishingas-to-account.js
    startCommand: node .output/server/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - fromGroup: galiluz-core
      - fromGroup: galiluz-int-mongodb
      - fromGroup: galiluz-int-cloudinary
      - fromGroup: galiluz-int-openai
      - fromGroup: galiluz-int-zoho-smtp
      - fromGroup: galiluz-int-turnstile
      - fromGroup: galiluz-int-posthog
      - fromGroup: galiluz-app-web

  # ── WhatsApp Cloud API Bot ─────────────────────────────────────
  - type: web
    name: galiluz-wa-bot
    runtime: node
    branch: main
    plan: starter
    region: frankfurt
    rootDir: apps/wa-bot
    buildCommand: npm install && (cd ../../packages/event-format && npm install)
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - fromGroup: galiluz-core
      - fromGroup: galiluz-int-openai
      - fromGroup: galiluz-int-whatsapp-cloud
      - fromGroup: galiluz-app-wa-bot

  # ── WhatsApp Gateway (Green API) ───────────────────────────────
  # Single bridge to the WhatsApp Business account. Sends OTP now; future:
  # incoming webhook + group ingestion. Single instance (one queue consumer).
  # No persistent disk — Green API holds the WhatsApp session remotely.
  - type: web
    name: galiluz-wa-gateway
    runtime: node
    branch: main
    plan: starter
    region: frankfurt
    numInstances: 1
    rootDir: apps/wa-gateway
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - fromGroup: galiluz-core
      - fromGroup: galiluz-int-green-api
      - fromGroup: galiluz-app-wa-gateway

# ── Environment Groups ──────────────────────────────────────────
# "sync: false" = enter the value in the Render dashboard. See docs/ENVIRONMENT.md.

envVarGroups:
  # ── Core (shared internal secret) ──
  - name: galiluz-core
    envVars:
      - key: API_SECRET           # shared by web, wa-bot, wa-gateway (min 16 chars)
        sync: false

  # ── Integration credentials ──
  - name: galiluz-int-mongodb
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        sync: false

  - name: galiluz-int-cloudinary
    envVars:
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        sync: false

  - name: galiluz-int-openai
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL          # wa-bot pipeline + web fallback
        value: gpt-4o-mini
      - key: OPENAI_MODEL_WEB      # web AI event-generation (stronger model)
        value: gpt-4o

  - name: galiluz-int-green-api
    envVars:
      - key: GREEN_API_ID_INSTANCE
        sync: false
      - key: GREEN_API_API_TOKEN_INSTANCE
        sync: false
      # Shared secret Green API sends on incoming webhooks (Authorization: Bearer).
      # REQUIRED for the crawler — the gateway webhook fails closed (503) without it.
      # Must equal the webhookUrlToken set on the Green API instance via setSettings.
      - key: GREEN_API_WEBHOOK_TOKEN
        sync: false
      # Optional host overrides (per-instance hosts, e.g. https://7105.api.green-api.com)
      - key: GREEN_API_BASE_URL
        sync: false
      - key: GREEN_API_MEDIA_URL
        sync: false

  - name: galiluz-int-whatsapp-cloud
    envVars:
      - key: WA_CLOUD_ACCESS_TOKEN
        sync: false
      - key: WA_PHONE_NUMBER_ID
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: APP_SECRET            # Meta app secret (webhook signature) — NOT API_SECRET
        sync: false
      - key: WHATSAPP_TEST_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_PROD_PHONE_NUMBER_ID
        sync: false

  - name: galiluz-int-zoho-smtp
    envVars:
      - key: SMTP_HOST
        value: smtppro.zoho.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_TO
        sync: false

  - name: galiluz-int-turnstile
    envVars:
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: NUXT_PUBLIC_TURNSTILE_SITE_KEY
        sync: false

  - name: galiluz-int-posthog
    envVars:
      - key: NUXT_PUBLIC_POSTHOG_PUBLIC_KEY
        sync: false
      - key: NUXT_PUBLIC_POSTHOG_HOST
        value: https://eu.i.posthog.com
      - key: NUXT_PUBLIC_POSTHOG_DEFAULTS
        value: "2026-01-30"
      - key: NUXT_PUBLIC_POSTHOG_IN_DEV
        value: "false"

  # ── Per-app config ──
  - name: galiluz-app-web
    envVars:
      - key: OTP_SECRET           # HMAC secret for OTP + sessions (min 32 chars)
        sync: false
      - key: WA_GATEWAY_URL       # URL of galiluz-wa-gateway (required in prod)
        sync: false
      - key: WA_BOT_URL           # URL of galiluz-wa-bot — web registration → approver Approve/Reject buttons
        sync: false
      - key: NUXT_PUBLIC_SITE_URL
        value: https://galiluz.co.il

  - name: galiluz-app-wa-bot
    envVars:
      - key: GALILUZ_APP_URL
        value: https://galiluz.co.il
      - key: PUBLISHERS_APPROVER_WA_NUMBER
        sync: false
      - key: APPROVER_REENGAGEMENT_TEMPLATE_NAME
        sync: false
      - key: APPROVER_REENGAGEMENT_TEMPLATE_LANGUAGE
        value: he
      - key: LOG_LEVEL
        value: info
      - key: ALLOW_MAIN_MENU_FREE_LANGUAGE
        value: "true"

  - name: galiluz-app-wa-gateway
    envVars:
      - key: WA_LOG_LEVEL
        value: info
      - key: WEB_APP_URL           # web app base URL — gateway forwards crawler messages to its internal API
        value: https://galiluz.co.il
